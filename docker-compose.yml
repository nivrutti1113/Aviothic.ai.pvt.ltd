version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/aviothic_db
      - SECRET_KEY=your_production_secret_key_here_change_this
      - DEVICE=cpu
    depends_on:
      - mongo
    volumes:
      - ./backend/app/static:/app/app/static
    restart: unless-stopped

  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  dicom_listener:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    command: python /app/integration/dicom_listener.py
    ports:
      - "11112:11112"
    environment:
      - BACKEND_PREDICT_URL=http://backend:8000/api/v1/predict
    depends_on:
      - backend
    restart: unless-stopped

  fhir_server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn integration.fhir_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  mongo_data: